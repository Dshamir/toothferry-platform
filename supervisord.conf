[supervisord]
nodaemon=true
logfile=/dev/null
logfile_maxbytes=0

[program:nextjs]
command=node /app/server.js
environment=HOSTNAME="0.0.0.0",PORT="8888"
autorestart=true
priority=1
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
stderr_logfile=/dev/fd/2
stderr_logfile_maxbytes=0

[program:ngrok]
command=ngrok http 127.0.0.1:8888 --url=tfai.ngrok.app --log=stdout
autorestart=true
priority=2
startsecs=3
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
stderr_logfile=/dev/fd/2
stderr_logfile_maxbytes=0
